# Daily review scrape for Discover Walks.
#
# Runs only the CI-capable scrapers (headless Chromium). The GetYourGuide
# scraper is deliberately NOT run here: it needs headed real Chrome to clear
# Cloudflare, so it can only run from a desktop. Do NOT add it to this workflow.
name: Daily review scrape

on:
  schedule:
    - cron: "17 9 * * *"  # 09:17 UTC — off-the-hour to reduce GitHub's scheduling delay (≈11:17 Paris CEST)
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # the built-in GITHUB_TOKEN needs write to push reviews.csv

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so "git pull --rebase" before push is safe

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # GetYourGuide is intentionally excluded — it requires headed real Chrome
      # (Cloudflare 403s headless) and cannot run in CI. Run it from a desktop.
      - name: Run scrapers (freetour + guruwalk only)
        env:
          CI: "true"
        run: |
          python scrapers/freetour_scraper.py
          python scrapers/guruwalk_scraper.py

      # TourDash is a REST API pull (no browser), so it runs fine in CI.
      - name: Pull TourDash bookings
        env:
          TOURDASH_API_KEY: ${{ secrets.TOURDASH_API_KEY }}
        run: python scrapers/tourdash_scraper.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.csv data/bookings.csv
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: $(date -u +%F) [CI freetour+guruwalk+tourdash]"
            git pull --rebase origin main
            git push origin main
          fi
