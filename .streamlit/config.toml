# Theme for the Discover Walks review dashboard.
# No `base` is set, so Streamlit follows the viewer's system light/dark
# preference. Only the accent colour is pinned — to a neutral slate-blue
# (less visually aggressive than the previous red) so filter chips, the
# slider, and primary buttons read as calm/neutral in both modes.
[theme]
primaryColor = "#5B7A99"
font = "sans serif"
